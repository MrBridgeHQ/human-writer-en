en:
  # Suspect vocabulary: Tier 1 (high signal) + Tier 2 (medium signal).
  # Tier 3 (low signal / frequency-only) is documented in tells-stylistic-en.md
  # but intentionally excluded here — the analyzer doesn't yet measure
  # paragraph-level Tier 3 density and false-positive risk is too high.
  # Total ~200 entries. See references/tells-stylistic-en.md for doctrine.
  suspect_vocabulary:
    # --- Tier 1: high signal ---
    # Metaphorical movement and discovery
    - delve
    - delving
    - embark
    - navigate
    - journey
    - unleash
    - harness
    - unlock
    # Inflated qualifiers
    - seamless
    - seamlessly
    - robust
    - transformative
    - vibrant
    - intricate
    - multifaceted
    - nuanced
    - paramount
    - pivotal
    - meticulous
    - meticulously
    - comprehensive
    - holistic
    # Marketing inflation
    - innovative
    - cutting-edge
    - state-of-the-art
    - revolutionary
    - game-changing
    - game-changer
    - world-class
    - best-in-class
    - unparalleled
